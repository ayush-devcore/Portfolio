<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>
:root{
  --bg:#070b14;
  --glass:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.18);
  --text:#eaf2ff;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body{
  font-family:Inter, sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* LOADER */
#loader{
  position:fixed;inset:0;
  background:#070b14;
  display:flex;align-items:center;justify-content:center;
  z-index:9999;
  font-size:28px;font-weight:800;
}

/* PARTICLES */
#bgCanvas{position:fixed;inset:0;z-index:-2}

/* CURSOR */
.cursor{
  position:fixed;
  width:18px;height:18px;
  border-radius:50%;
  background:#6cf2ff;
  pointer-events:none;
  mix-blend-mode:screen;
  transform:translate(-50%,-50%);
  z-index:9999;
}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;
  backdrop-filter:blur(20px);
  background:var(--glass);
  border-bottom:1px solid var(--border);
  padding:18px 6%;
  display:flex;justify-content:space-between;align-items:center;
  z-index:1000;
}

nav ul{display:flex;gap:28px;list-style:none}
nav a{color:#cfe6ff;text-decoration:none;font-weight:600;opacity:.7}
nav a.active{opacity:1}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  text-align:center;
  padding:120px 20px 60px;
  position:relative;
}

#threeHero{position:absolute;inset:0;z-index:-1}

.hero h1{font-size:clamp(46px,7vw,90px);font-weight:900}
.hero p{margin-top:20px;color:#b8c7e0}

.btn{
  margin-top:30px;
  padding:14px 30px;
  border-radius:16px;
  border:1px solid var(--border);
  background:var(--glass);
  backdrop-filter:blur(20px);
  color:white;font-weight:700;
  cursor:pointer;
  transition:.25s;
}
.btn:hover{transform:scale(1.08)}

/* SECTIONS */
section{padding:120px 6%}
h2{text-align:center;margin-bottom:60px;font-size:38px}

.glass{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:24px;
  padding:30px;
}

/* PROJECTS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}

.card{
  transition:transform .2s;
  transform-style:preserve-3d;
}

.card iframe{width:100%;height:200px;border:none;border-radius:14px}

/* CONTACT */
input,textarea{
  width:100%;
  margin:10px 0;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#0f1423;
  color:white;
}

/* ❌ RESIZE DISABLED */
textarea{resize:none}

/* TOP BUTTON */
#topBtn{
  position:fixed;
  bottom:30px;
  right:30px;
  width:48px;
  height:48px;
  border:none;
  border-radius:50%;
  background:rgba(108,242,255,.2);
  backdrop-filter:blur(10px);
  color:white;
  font-size:20px;
  cursor:pointer;
  display:none;
  z-index:999;
  transition:.3s;
}
#topBtn:hover{transform:scale(1.15)}

footer{text-align:center;padding:40px;color:#8ea0c2}

@media(max-width:768px){
  h1{font-size:42px}
}
</style>
</head>

<body>

<div id="loader">Loading Experience…</div>
<canvas id="bgCanvas"></canvas>
<div class="cursor"></div>

<nav>
  <strong>AYUSH BHATNAGAR</strong>
  <ul>
    <li><a href="#home" class="active">Home</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section id="home" class="hero">
  <div id="threeHero"></div>
  <div>
    <h1>Future-Grade Portfolio</h1>
    <p>Ultra-realistic UI. Elite performance. Cinematic experience.</p>
    <button class="btn" onclick="scrollToProjects()">View Projects</button>
  </div>
</section>

<section id="projects">
  <h2>Live Projects</h2>
  <div class="grid">
    <div class="glass card"><h3>Project One</h3><iframe src="https://example.com"></iframe></div>
    <div class="glass card"><h3>Project Two</h3><iframe src="https://example.com"></iframe></div>
    <div class="glass card"><h3>Project Three</h3><iframe src="https://example.com"></iframe></div>
  </div>
</section>

<section id="contact">
  <h2>Feedback</h2>
  <div class="glass">
    <input id="name" placeholder="Your Name">
    <input id="email" placeholder="Email">
    <textarea id="msg" rows="5" placeholder="Your Feedback"></textarea>
    <button class="btn" onclick="sendMsg()">Send</button>
  </div>
</section>

<footer>© <span id="year"></span> Ayush</footer>

<button id="topBtn">↑</button>

<script>

/* LOADER */
window.addEventListener('load',()=>{
  setTimeout(()=>loader.style.display='none',800)
})

/* DYNAMIC YEAR */
document.getElementById("year").textContent=new Date().getFullYear()

/* SMOOTH BUTTON */
function scrollToProjects(){
  document.querySelector('#projects').scrollIntoView({behavior:'smooth'})
}

/* FORM VALIDATION */
function sendMsg(){
  const name=nameInput.value.trim()
  const email=emailInput.value.trim()
  const msg=msgInput.value.trim()

  if(!name || !email || !msg){
    alert("Please fill all fields ⚠")
    return
  }

  alert("Feedback sent successfully ✔")

  nameInput.value=""
  emailInput.value=""
  msgInput.value=""
}

const nameInput=document.getElementById("name")
const emailInput=document.getElementById("email")
const msgInput=document.getElementById("msg")

/* CURSOR GLOW */
const cursor=document.querySelector('.cursor')
document.addEventListener('mousemove',e=>{
  cursor.style.left=e.clientX+'px'
  cursor.style.top=e.clientY+'px'
})

/* PARTICLES */
const canvas=document.getElementById('bgCanvas')
const ctx=canvas.getContext('2d')
let w,h,parts=[]
function resize(){w=canvas.width=innerWidth;h=canvas.height=innerHeight}
resize();addEventListener('resize',resize)
for(let i=0;i<100;i++)parts.push({x:Math.random()*w,y:Math.random()*h,vx:.3,vy:.3})
function draw(){
 ctx.clearRect(0,0,w,h)
 parts.forEach(p=>{
  p.x+=p.vx;p.y+=p.vy
  if(p.x>w||p.x<0)p.vx*=-1
  if(p.y>h||p.y<0)p.vy*=-1
  ctx.fillStyle='rgba(108,242,255,.7)'
  ctx.fillRect(p.x,p.y,2,2)
 })
 requestAnimationFrame(draw)
}
draw()

/* THREE JS HERO */
const scene=new THREE.Scene()
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,1000)
const renderer=new THREE.WebGLRenderer({alpha:true})
renderer.setSize(innerWidth,innerHeight)
document.getElementById('threeHero').appendChild(renderer.domElement)

const geo=new THREE.TorusKnotGeometry(10,3,100,16)
const mat=new THREE.MeshBasicMaterial({color:0x6cf2ff,wireframe:true})
const mesh=new THREE.Mesh(geo,mat)
scene.add(mesh)
camera.position.z=30

function animate(){
 mesh.rotation.x+=.003
 mesh.rotation.y+=.005
 renderer.render(scene,camera)
 requestAnimationFrame(animate)
}
animate()

/* CARD TILT EFFECT */
document.querySelectorAll('.card').forEach(card=>{
  card.addEventListener('mousemove',e=>{
    const r=card.getBoundingClientRect()
    const x=(e.clientX-r.left)/r.width-.5
    const y=(e.clientY-r.top)/r.height-.5
    card.style.transform=`rotateY(${x*12}deg) rotateX(${y*-12}deg)`
  })
  card.addEventListener('mouseleave',()=>{
    card.style.transform='rotateY(0) rotateX(0)'
  })
})

/* BACK TO TOP + NAV ACTIVE */
const topBtn=document.getElementById("topBtn")

window.addEventListener("scroll",()=>{
  topBtn.style.display=window.scrollY>400?"block":"none"

  document.querySelectorAll("section").forEach(sec=>{
    const rect=sec.getBoundingClientRect()
    const link=document.querySelector(`nav a[href="#${sec.id}"]`)
    if(rect.top<=100 && rect.bottom>=100){
      document.querySelectorAll("nav a").forEach(a=>a.classList.remove("active"))
      if(link) link.classList.add("active")
    }
  })
})

topBtn.onclick=()=>window.scrollTo({top:0,behavior:"smooth"})
</script>

</body>
</html>
